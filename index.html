<script>

const list = document.getElementById("news-list");

firebase.database().ref("news")
.orderByChild("time")
.limitToLast(3)
.once("value")
.then(snapshot => {

let news=[];

snapshot.forEach(child=>{
let d=child.val();
d._key=child.key;
news.push(d);
});

news.sort((a,b)=>b.time-a.time);

renderNews(news);

});

function renderNews(news){

list.innerHTML="";

news.forEach(d=>{

let date=new Date(d.time).toLocaleDateString();

list.innerHTML+=`

<div class="news-item">

<div class="news-imgbox">

<div class="news-date">${date}</div>

${d.img ? `<img src="${d.img}" class="news-img" onclick="openZoom('${d.img}')">` : ""}

</div>

<div class="news-text">

<div class="news-title">${d.title || ""}</div>

<p>${d.desc || ""}</p>

</div>

</div>

`;

});

}

function openZoom(src){
document.getElementById("zoomImg").src=src;
document.getElementById("zoomBox").style.display="flex";
}

function closeZoom(){
document.getElementById("zoomBox").style.display="none";
}

</script>

<div id="zoomBox" onclick="closeZoom()">
