<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.10.0/firebase-app.js";
import { getDatabase, ref, get, child, runTransaction }
from "https://www.gstatic.com/firebasejs/12.10.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyBnyQoublVGkkJoInjaFlAvyS_a28sqB7o",
  authDomain: "eigame-fanarts.firebaseapp.com",
  databaseURL: "https://eigame-fanarts-default-rtdb.firebaseio.com",
  projectId: "eigame-fanarts"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

/* LOAD NEWS */
get(child(ref(db), "news")).then(snapshot=>{
  if(snapshot.exists()){
    Object.entries(snapshot.val())
    .slice(0,6)
    .forEach(([id,n])=>{
      document.getElementById("newsList").innerHTML+=`
      <div class="news-item">
        <img src="${n.image}">
        <div>
          <h3>${n.title}</h3>
          <p>${n.description?.substring(0,100) || ""}...</p>
        </div>
      </div>`;
    });
  }
});

/* LOAD GALLERY */
get(child(ref(db), "gallery")).then(snapshot=>{
  if(snapshot.exists()){
    Object.entries(snapshot.val())
    .slice(0,6)
    .forEach(([id,g])=>{
      document.getElementById("galleryList").innerHTML+=`
      <div>
        <img src="${g.image}">
        <p>${g.credit || ""}</p>
      </div>`;
    });
  }
});

/* HIT COUNTER */
runTransaction(ref(db,"counter"),current=>{
  return (current||0)+1;
}).then(result=>{
  document.getElementById("visitorCount").innerText=
  String(result.snapshot.val()).padStart(6,'0');
});
</script>

<!-- CALENDAR -->
<script>
function generateCalendar(){
  const now=new Date();
  const year=now.getFullYear();
  const month=now.getMonth();
  const today=now.getDate();

  document.getElementById("calendarTitle").innerText=
  now.toLocaleString('default',{month:'long'})+" "+year;

  const firstDay=new Date(year,month,1).getDay();
  const daysInMonth=new Date(year,month+1,0).getDate();

  let table="<tr><th>S</th><th>M</th><th>T</th><th>W</th><th>T</th><th>F</th><th>S</th></tr><tr>";

  for(let i=0;i<firstDay;i++) table+="<td></td>";

  for(let d=1;d<=daysInMonth;d++){
    let cls=d===today?"today":"";
    table+=`<td class="${cls}">${d}</td>`;
    if((d+firstDay)%7===0) table+="</tr><tr>";
  }

  table+="</tr>";
  document.getElementById("calendarTable").innerHTML=table;
}
generateCalendar();
</script>
